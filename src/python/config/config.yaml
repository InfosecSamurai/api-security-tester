general:
  timeout_seconds: 10
  verify_ssl: true
  allow_redirects: true
  user_agent: "api-security-tester/1.0"
  headers: {}

tests:
  sql_injection: true
  xss: true
  broken_auth: true
  sensitive_data: true
  rate_limiting: true

sql_injection:
  test_endpoint: ""
  parameter: "input"
  test_payloads:
    - "'"
    - "\""
    - "' OR '1'='1"
    - "' OR 1=1--"
  error_signatures:
    - "sql syntax"
    - "mysql"
    - "postgresql"
    - "sqlite"
    - "odbc"
    - "ora-"
    - "syntax error"
    - "unterminated quoted string"

xss:
  test_endpoint: ""
  parameter: "input"
  test_payloads:
    - "<script>alert('xss')</script>"
    - "\"><svg/onload=alert('xss')>"

broken_auth:
  auth_endpoints:
    login: "/login"
    protected: "/admin"
  test_credentials:
    - username: "admin"
      password: "admin"
    - username: "user"
      password: "password"
  success_indicators:
    - "token"
    - "access_token"
    - "jwt"
    - "session"

sensitive_data:
  endpoints:
    - "/users"
    - "/profile"
    - "/account"
  patterns:
    password: "password"
    api_key: "api[_-]?key"
    secret: "secret"
    token: "access[_-]?token|refresh[_-]?token|bearer"
    ssn: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    credit_card: "\\b(?:\\d[ -]*?){13,16}\\b"

rate_limiting:
  test_endpoint: "/api/data"
  max_requests: 20
  threshold_seconds: 10
  delay_seconds: 0.05
